---
.input-variables-ansible:
 - |
    print_input_parameters() {
      if [ -n "$2" ]; then
        printf "│ %-40s │ %-90s │\n" "$1" "$2"
      fi
    }
    echo ""
    echo -e "\033[1;33m===>\033[0m 💾 Print set inputs Variables"
    echo -e "┌──────────────────────────────────────────┬────────────────────────────────────────────────────────────────────────────────────────────┐"
    printf "│ %-40s │ %-90s │\n" "Variable" "Value"
    echo -e "├──────────────────────────────────────────┼────────────────────────────────────────────────────────────────────────────────────────────┤"
    print_input_parameters COMPONENT_VERSION_VALIDATE $COMPONENT_VERSION_VALIDATE
    echo -e "├──────────────────────────────────────────┼────────────────────────────────────────────────────────────────────────────────────────────┤"
    print_input_parameters CONTAINER_IMAGE_ANSIBLE $CONTAINER_IMAGE_ANSIBLE
    print_input_parameters SSH_PUBLIC_KEY "<< masked >>"
    print_input_parameters ANSIBLE_INVENTORY $ANSIBLE_INVENTORY
    print_input_parameters ANSIBLE_VARS $ANSIBLE_VARS
    echo -e "└──────────────────────────────────────────┴────────────────────────────────────────────────────────────────────────────────────────────┘"

    echo -e "┌───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┐"
    printf "│ %-133s │\n" "Playbook"
    echo -e "├───────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┤"
    for file in playbooks/*.yml; do
      printf "│ %-10s │ %-130s │\n" "Playbook" "$file"
    done
    echo -e "└────────────┴────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────┘"
