---
.input-variables-yaml:
  - |
    echo ""
    echo -e "\033[1;33m===>\033[0m 💾 Print set inputs Variables"
    echo -e "┌───────────────────────────┬────────────────────────────────────────────────────────────────────────────────────────────────────┐"
    printf "| %-25s | %-100s |\n" "Variable" "Value"
    echo -e "├───────────────────────────┼────────────────────────────────────────────────────────────────────────────────────────────────────┤"
    printf "| %-25s | %-100s |\n" "CONTAINER_IMAGE_PYTHON" $CONTAINER_IMAGE_PYTHON
    printf "| %-25s | %-100s |\n" "YAMLLINT_URL" $YAMLLINT_URL
    echo -e "└───────────────────────────┴────────────────────────────────────────────────────────────────────────────────────────────────────┘"
